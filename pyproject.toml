[project]
name = "phycode"
version = "0.1.0"
description = "CLI-first coding agent harness with policy-aware tool runtime"
requires-python = ">=3.11"
dependencies = [
    "cryptography>=43.0.0",
    "keyring>=25.0.0",
    "openai>=1.0.0",
    "pydantic>=2.7.0",
    "rich>=13.7.0",
    "typer>=0.12.0",
]

[project.scripts]
phycode = "phycode.cli:app"

[dependency-groups]
dev = [
    "pytest>=8.2.0",
    "pytest-cov>=5.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/phycode"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
addopts = "-q"
